name: Sync Fork Main

on:
  schedule:
    - cron: '0 */5 * * *' # every 5 hour
  workflow_dispatch:

jobs:
  sync-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Add upstream remote
        run: git remote add upstream https://github.com/DreamMaoMao/mangowc

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream into main
        run: |
          git merge upstream/main -m "Sync with upstream" || echo "Merge conflict detected"

      - name: Push main
        run: git push origin main
